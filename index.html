<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Compiler Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.0/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.0/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.0/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.0/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.0/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.0/mode/htmlmixed/htmlmixed.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Space+Grotesk:wght@300;500&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: #050208;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 10, 50, 0.4) 0%, transparent 80%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .btn-clean {
    background: transparent;
    color: rgba(255, 255, 255, 0.941);
    border: 1px solid rgba(255, 0, 0, 0.3);
    padding: 8px 18px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 0.85rem;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 2px;
}

.btn-clean:hover {
    color: #ff0000;
    text-shadow: 0 0 15px rgba(255, 0, 0, 0.9);
    letter-spacing: 4px;
    border-color: #ff0000;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
}

        .saber-header {
            height: 2.5px;
            background: #fff;
            margin: 10px 0;
            position: relative;
            box-shadow: 0 0 8px #ff0000, 0 0 16px #ff0000;
            width: 0%; 
            animation: ignite-horizontal 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes ignite-horizontal {
            0% { width: 0%; opacity: 0; }
            100% { width: 100%; opacity: 1; }
        }

        .saber-label {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0000;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
            animation-delay: 1s;
            margin-bottom: 4px;
            display: block;
        }
   
        .lightsaber-divider {
            width: 3px;
            background: #fff;
            box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            height: 0%;
            opacity: 0;
            animation: ignite-vertical 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 0.5s;
        }

        @keyframes ignite-vertical {
            0% { height: 0%; opacity: 0; }
            100% { height: 100%; opacity: 1; }
        }

        .glass-panel { 
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 0.8s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .CodeMirror { 
            height: 100% !important;
            font-size: 13px;
            background: white !important;
            color: #1a1a1a !important;
            padding: 10px;
        }
        
        .CodeMirror-gutters { 
            background: #f5f5f5 !important;
            border-right: 1px solid rgba(0, 0, 0, 0.1) !important;
        }

        .CodeMirror-cursor { border-left: 1px solid #ff0000 !important; }

        .CodeMirror-linenumber {
            color: #666 !important;
        }

        iframe#preview {
            background: white !important;
        }

        #optionsDropdown {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #440000;
        }
        
        #optionsDropdown button {
            background: transparent;
            color: rgba(255, 255, 255, 0.925);
            padding: 12px 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            text-align: left;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,0,0,0.1);
        }

        #optionsDropdown button:hover {
            color: #ff0000;
            background: rgba(255,0,0,0.05);
        }
    </style>
</head>
<body class="p-6">
    <header class="text-center py-6 mb-4">
    <h1 class="text-3xl font-bold tracking-wider" style="font-family: 'Space Grotesk', sans-serif; color: #fff; text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);">
        PROJECTILE
    </h1>
    <div class="w-20 h-0.5 mx-auto bg-red-500 mt-2" style="box-shadow: 0 0 8px #ff0000;"></div>
</header>
    <div class="max-w-[1800px] mx-auto relative z-10">
        <div class="flex items-center justify-between mb-8">
            <div id="controlsContainer" class="flex items-center gap-6">
                <button id="runBtn" class="btn-clean">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    Preview
                </button>
                <a href="ppt.html" id="saveBtn" class="btn-clean flex items-center gap-2">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 3H14C15.1046 3 16 3.89543 16 5V19C16 20.1046 15.1046 21 14 21H2C0.89543 21 0 20.1046 0 19V5C0 3.89543 0.89543 3 2 3ZM5 17H12V15H5V17ZM12 13H5V11H12V13ZM5 9H12V7H5V9ZM18 3H22C22.5523 3 23 3.44772 23 4V20C23 20.5523 22.5523 21 22 21H18V3Z"/>
                        <text x="18.5" y="17" font-size="8" fill="white" font-family="Arial, sans-serif" font-weight="bold">P</text>
                    </svg>
                    PPT
                </a>
                              
                <div class="relative">
                    <button id="moreOptionsBtn" class="btn-clean">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        Menu
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="optionsDropdown" class="hidden absolute top-full left-0 mt-4 rounded-sm shadow-2xl min-w-[220px] z-50 overflow-hidden">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-0">
            <div class="flex-1">
                <span class="saber-label">Editor</span>
                <div class="saber-header"></div>
                <div class="glass-panel rounded-sm overflow-hidden" style="height: 700px;">
                    <textarea id="code" placeholder="Write your HTML code here..."></textarea>
                </div>
                <div id="sessionInfo" class="hidden mt-4 p-4 text-xs tracking-widest text-gray-500 uppercase"></div>
            </div>

            <div class="hidden lg:flex flex-col items-center px-8" style="height: 750px;">
                <div class="lightsaber-divider"></div>
            </div>

            <div class="flex-1">
                <span class="saber-label">Preview</span>
                <div class="saber-header"></div>
                <div id="previewContainer" class="glass-panel rounded-sm overflow-hidden flex flex-col" style="height: 700px;">
                    <iframe id="preview" class="flex-1 w-full border-0"></iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="connectionStatus" class="hidden fixed bottom-8 right-8 px-6 py-2 border border-red-900 text-red-500 text-[10px] tracking-[4px] uppercase z-50 bg-black/80 backdrop-blur-md"></div>
    

    <script>
class HTMLCompiler {
    constructor() {
        this.firebaseConfig = {
            apiKey: "AIzaSyA8uC71uUIxCrmI5Rfm3WIe08uknDGk2xM",
  authDomain: "code-compiler-1.firebaseapp.com",
  databaseURL: "https://code-compiler-1-default-rtdb.firebaseio.com",
  projectId: "code-compiler-1",
  storageBucket: "code-compiler-1.firebasestorage.app",
  messagingSenderId: "779001738729",
  appId: "1:779001738729:web:0b1bdd8960439b2ad50778"
        };

        this.sessionId = this.getSessionIdFromUrl() || this.generateSessionId();
        this.collaborators = {};
        this.currentUser = {
            id: `user_${Math.random().toString(36).substr(2, 9)}`,
            color: this.getRandomColor(),
            name: null,
            isOwner: false
        };

        this.isLocalUpdate = false;
        this.disableSync = false;
        this.firebaseConnected = false;
        this.userPermissions = {};
        this.removedFromSession = false;

        this.initializeEditor();
        this.setupEventListeners();
        this.initializeFirebaseWithRetry();
        this.createDialogElements();
    }

    createDialogElements() {
        const nameDialog = document.createElement('div');
        nameDialog.id = 'nameDialog';
        nameDialog.className = 'hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        nameDialog.innerHTML = `
            <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl">
    <h2 class="text-2xl font-bold mb-4 text-gray-900">Enter Your Name</h2>
    <input type="text" id="userName" placeholder="Your name..." 
           class="w-full px-4 py-3 border-2 border-gray-400 text-black rounded-lg mb-4 focus:outline-none focus:border-black" maxlength="30">
    <div class="flex gap-3">
        <button id="confirmName" 
                class="flex-1 bg-black text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
            Confirm
        </button>
        <button id="cancelName" 
                class="flex-1 bg-gray-300 text-gray-900 px-6 py-3 rounded-lg font-semibold hover:bg-gray-400 transition">
            Cancel
        </button>
    </div>
</div>

        `;
        document.body.appendChild(nameDialog);

        const joinRequestDialog = document.createElement('div');
        joinRequestDialog.id = 'joinRequestDialog';
        joinRequestDialog.className = 'hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        joinRequestDialog.innerHTML = `
           <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl">
    <h2 class="text-2xl font-bold mb-4 text-gray-900">Join Request</h2>
    <p id="joinRequestMessage" class="text-gray-700 mb-6"></p>
    <div class="flex gap-3 mb-4">
        <button id="allowReadOnly" 
                class="flex-1 bg-gray-700 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
            Read Only
        </button>
        <button id="allowWrite" 
                class="flex-1 bg-black text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
            Allow Edit
        </button>
    </div>
    <button id="denyJoin" 
            class="w-full bg-gray-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-600 transition">
        Deny
    </button>
</div>

        `;
        document.body.appendChild(joinRequestDialog);

        const waitingDialog = document.createElement('div');
        waitingDialog.id = 'waitingDialog';
        waitingDialog.className = 'hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        waitingDialog.innerHTML = `
            <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-amber-500 mx-auto mb-4"></div>
                <h2 class="text-2xl font-bold mb-2 text-gray-800">Waiting for Approval</h2>
                <p class="text-gray-600 mb-4">The session owner is reviewing your join request...</p>
                <button id="cancelWaiting" class="bg-red-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-red-600 transition">Cancel</button>
            </div>
        `;
        document.body.appendChild(waitingDialog);

        const userManageDialog = document.createElement('div');
        userManageDialog.id = 'userManageDialog';
        userManageDialog.className = 'hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
        userManageDialog.innerHTML = `
           <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl">
    <h2 class="text-2xl font-bold mb-4 text-gray-900">Manage User</h2>
    <div id="userManageContent" class="mb-6"></div>
    <div class="flex gap-3 mb-4">
        <button id="togglePermission" 
                class="flex-1 bg-gray-700 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
            Toggle Permission
        </button>
        <button id="removeUser" 
                class="flex-1 bg-gray-900 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
            Remove User
        </button>
    </div>
    <button id="closeManageDialog" 
            class="w-full bg-gray-500 text-white px-6 py-3 rounded-lg font-semibold hover:bg-gray-600 transition">
        Close
    </button>
</div>

        `;
        document.body.appendChild(userManageDialog);

        document.getElementById('confirmName').addEventListener('click', () => this.handleNameConfirmation());
        document.getElementById('cancelName').addEventListener('click', () => this.handleNameCancel());
        document.getElementById('allowReadOnly').addEventListener('click', () => this.handleJoinResponse('readonly'));
        document.getElementById('allowWrite').addEventListener('click', () => this.handleJoinResponse('write'));
        document.getElementById('denyJoin').addEventListener('click', () => this.handleJoinResponse('deny'));
        document.getElementById('cancelWaiting').addEventListener('click', () => this.cancelJoinRequest());
        document.getElementById('togglePermission').addEventListener('click', () => this.handleTogglePermission());
        document.getElementById('removeUser').addEventListener('click', () => this.handleRemoveUser());
        document.getElementById('closeManageDialog').addEventListener('click', () => this.hideUserManageDialog());
        document.getElementById('userName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.handleNameConfirmation();
        });
    }

    showNameDialog() {
        return new Promise((resolve, reject) => {
            this.nameDialogResolve = resolve;
            this.nameDialogReject = reject;
            document.getElementById('nameDialog').classList.remove('hidden');
            document.getElementById('userName').focus();
        });
    }

    handleNameConfirmation() {
        const nameInput = document.getElementById('userName');
        const name = nameInput.value.trim();
        
        if (name) {
            this.currentUser.name = name;
            document.getElementById('nameDialog').classList.add('hidden');
            nameInput.value = '';
            if (this.nameDialogResolve) this.nameDialogResolve(name);
        } else {
            alert('Please enter your name');
        }
    }

    handleNameCancel() {
        document.getElementById('nameDialog').classList.add('hidden');
        document.getElementById('userName').value = '';
        if (this.nameDialogReject) this.nameDialogReject('cancelled');
    }

    showWaitingDialog() {
        document.getElementById('waitingDialog').classList.remove('hidden');
    }

    hideWaitingDialog() {
        document.getElementById('waitingDialog').classList.add('hidden');
    }

    showJoinRequestDialog(userId, userName) {
        document.getElementById('joinRequestMessage').textContent = `${userName} wants to join your session`;
        document.getElementById('joinRequestDialog').classList.remove('hidden');
        document.getElementById('joinRequestDialog').dataset.userId = userId;
    }

    hideJoinRequestDialog() {
        document.getElementById('joinRequestDialog').classList.add('hidden');
    }

    showUserManageDialog(userId, userName, permission) {
        const contentDiv = document.getElementById('userManageContent');
        const permissionText = permission === 'write' ? 'Write Access' : 'Read Only Access';
        
        contentDiv.innerHTML = `
            <div class="flex items-center gap-3 mb-4">
                <span class="w-8 h-8 rounded-full" style="background-color: ${this.collaborators[userId]?.color || '#666'}"></span>
                <div>
                    <p class="font-semibold text-gray-800">${userName}</p>
                    <p class="text-sm text-gray-600">Current: ${permissionText}</p>
                </div>
            </div>
        `;
        
        document.getElementById('userManageDialog').classList.remove('hidden');
        document.getElementById('userManageDialog').dataset.userId = userId;
        document.getElementById('userManageDialog').dataset.currentPermission = permission;
    }

    hideUserManageDialog() {
        document.getElementById('userManageDialog').classList.add('hidden');
    }

    handleTogglePermission() {
        const userId = document.getElementById('userManageDialog').dataset.userId;
        const currentPermission = document.getElementById('userManageDialog').dataset.currentPermission;
        
        const newPermission = currentPermission === 'write' ? 'readonly' : 'write';
        this.toggleUserPermission(userId, newPermission);
        this.hideUserManageDialog();
    }

    handleRemoveUser() {
        const userId = document.getElementById('userManageDialog').dataset.userId;
        
        if (confirm('Are you sure you want to remove this user from the session?')) {
            this.removeUserFromSession(userId);
            this.hideUserManageDialog();
        }
    }

    removeUserFromSession(userId) {
        if (!this.currentUser.isOwner || !this.firebaseConnected || !this.db) return;

        const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
        
        sessionRef.child(`users/${userId}`).remove();
        sessionRef.child(`permissions/${userId}`).remove();
        sessionRef.child(`removedUsers/${userId}`).set({
            removedAt: firebase.database.ServerValue.TIMESTAMP,
            removedBy: this.currentUser.id
        });
        
        delete this.userPermissions[userId];
        delete this.collaborators[userId];
        
        this.updateCollaboratorsList();
        this.showConnectionStatus('User removed from session', 'success');
    }

    handleJoinResponse(response) {
        const userId = document.getElementById('joinRequestDialog').dataset.userId;
        
        if (!this.firebaseConnected || !this.db) return;

        const requestRef = this.db.ref(`htmlSessions/${this.sessionId}/joinRequests/${userId}`);
        
        requestRef.update({
            status: response,
            respondedAt: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            this.hideJoinRequestDialog();
            
            if (response !== 'deny') {
                this.userPermissions[userId] = response;
                const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
                sessionRef.child(`permissions/${userId}`).set(response);
            }
        }).catch(error => {
            console.error('Error responding to join request:', error);
        });
    }

    cancelJoinRequest() {
        if (!this.firebaseConnected || !this.db) return;

        const requestRef = this.db.ref(`htmlSessions/${this.sessionId}/joinRequests/${this.currentUser.id}`);
        requestRef.remove().then(() => {
            this.hideWaitingDialog();
            window.location.href = window.location.origin + window.location.pathname;
        });
    }

    initializeEditor() {
    this.editor = CodeMirror.fromTextArea(document.getElementById("code"), {
        lineNumbers: true,
        mode: "htmlmixed",
        tabSize: 2,
        lineWrapping: true,
        autoCloseBrackets: true,
        matchBrackets: true,
        indentUnit: 2,
        styleActiveLine: true,
        readOnly: false
    });

    this.elements = {
        runButton: document.getElementById("runBtn"),
        preview: document.getElementById("preview"),
        collaborateButton: document.createElement("button"),
        sessionInfoDisplay: document.getElementById("sessionInfo"),
        connectionStatus: document.getElementById("connectionStatus")
    };

    this.elements.collaborateButton.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
        <span class="font-semibold text-white-800">Collaborate</span>
    `;
    this.elements.collaborateButton.className = "w-full text-left px-4 py-3 bg-white hover:bg-gray-50 transition flex items-center gap-2 border-b border-gray-200";

    const optionsDropdown = document.getElementById("optionsDropdown");
    if (optionsDropdown) {
        optionsDropdown.appendChild(this.elements.collaborateButton);
    }
}
    setupEventListeners() {
        this.elements.runButton.addEventListener("click", () => this.previewHTML());
        this.elements.collaborateButton.addEventListener("click", () => this.shareSession());

        let changeTimeout = null;
        this.editor.on("changes", () => {
            if (this.firebaseConnected && !this.disableSync && this.canEdit()) {
                clearTimeout(changeTimeout);
                changeTimeout = setTimeout(() => {
                    this.syncCodeToFirebase();
                }, 300);
            }
        });

        document.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                this.previewHTML();
            }
        });
        
        window.addEventListener('beforeunload', () => this.cleanupFirebaseConnections());
    }

    canEdit() {
        if (this.removedFromSession) return false;
        if (this.currentUser.isOwner) return true;
        return this.userPermissions[this.currentUser.id] === 'write';
    }

    setEditorReadOnly(isReadOnly) {
        this.editor.setOption('readOnly', isReadOnly);
        
        if (isReadOnly) {
            this.showConnectionStatus("You have read-only access to this session", "warning");
        }
    }

    showConnectionStatus(message, type = "info") {
        const statusEl = this.elements.connectionStatus;
        statusEl.textContent = message;
        statusEl.className = `fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg font-medium z-50`;
        
        if (type === "success") {
            statusEl.className += " bg-green-500 text-white";
        } else if (type === "error") {
            statusEl.className += " bg-red-500 text-white";
        } else if (type === "warning") {
            statusEl.className += " bg-yellow-500 text-white";
        } else {
            statusEl.className += " bg-amber-500 text-white";
        }
        
        statusEl.classList.remove("hidden");
        
        if (type === "info" || type === "success") {
            setTimeout(() => {
                statusEl.classList.add("hidden");
            }, 5000);
        }
    }

    previewHTML() {
    const code = this.editor.getValue();
    const iframe = this.elements.preview;
    
    iframe.src = 'about:blank';
    
    iframe.onload = function() {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(code);
        iframeDoc.close();
    };
}

    initializeFirebaseWithRetry(retryCount = 0) {
        const maxRetries = 3;
        
        if (retryCount > maxRetries) {
            this.showConnectionStatus("Failed to connect to collaboration service after multiple attempts.", "error");
            return;
        }
        
        this.showConnectionStatus("Connecting to collaboration service...", "info");
        
        this.loadScript('https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js')
            .then(() => this.loadScript('https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js'))
            .then(() => {
                this.setupFirebase();
            })
            .catch((error) => {
                console.error('Firebase script loading error:', error);
                setTimeout(() => {
                    this.initializeFirebaseWithRetry(retryCount + 1);
                }, 2000 * Math.pow(2, retryCount));
            });
    }
    
    loadScript(src) {
        return new Promise((resolve, reject) => {
            if (document.querySelector(`script[src="${src}"]`)) {
                resolve();
                return;
            }
            
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            
            script.onload = () => resolve();
            script.onerror = (e) => reject(new Error(`Script load error for ${src}`));
            
            document.head.appendChild(script);
        });
    }
    
    setupFirebase() {
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(this.firebaseConfig);
            }
            
            this.db = firebase.database();
            
            const connectedRef = this.db.ref(".info/connected");
            connectedRef.on("value", (snap) => {
                if (snap.val() === true) {
                    this.firebaseConnected = true;
                    this.showConnectionStatus("Connected to collaboration service!", "success");
                    
                    if (this.getSessionIdFromUrl()) {
                        this.checkAndJoinSession(this.sessionId);
                    }
                } else {
                    this.firebaseConnected = false;
                    this.showConnectionStatus("Disconnected from collaboration service.", "error");
                }
            });
            
        } catch (error) {
            console.error('Firebase initialization error:', error);
            this.firebaseConnected = false;
            this.showConnectionStatus("Failed to connect to collaboration service.", "error");
        }
    }

    async checkAndJoinSession(sessionId) {
        const sessionRef = this.db.ref(`htmlSessions/${sessionId}`);
        
        try {
            const snapshot = await sessionRef.once('value');
            
            if (snapshot.exists()) {
                const sessionData = snapshot.val();
                
                if (sessionData.owner) {
                    try {
                        const userName = await this.showNameDialog();
                        this.currentUser.name = userName;
                        
                        const removedSnapshot = await sessionRef.child(`removedUsers/${this.currentUser.id}`).once('value');
                        if (removedSnapshot.exists()) {
                            alert('You have been removed from this session and cannot rejoin.');
                            window.location.href = window.location.origin + window.location.pathname;
                            return;
                        }
                        
                        await this.requestJoinPermission(sessionId, userName);
                    } catch (error) {
                        if (error === 'cancelled') {
                            window.location.href = window.location.origin + window.location.pathname;
                        }
                    }
                } else {
                    this.currentUser.isOwner = true;
                    this.joinExistingSession(sessionId);
                }
            } else {
                this.currentUser.isOwner = true;
                try {
                    const userName = await this.showNameDialog();
                    this.currentUser.name = userName;
                } catch (error) {
                    if (error === 'cancelled') {
                        this.currentUser.name = `User ${Math.floor(Math.random() * 1000)}`;
                    }
                }
            }
        } catch (error) {
            console.error('Error checking session:', error);
        }
    }

    async requestJoinPermission(sessionId, userName) {
        if (!this.firebaseConnected || !this.db) return;

        const requestRef = this.db.ref(`htmlSessions/${sessionId}/joinRequests/${this.currentUser.id}`);
        
        await requestRef.set({
            userId: this.currentUser.id,
            userName: userName,
            color: this.currentUser.color,
            status: 'pending',
            requestedAt: firebase.database.ServerValue.TIMESTAMP
        });

        this.showWaitingDialog();

        requestRef.on('value', (snapshot) => {
            const request = snapshot.val();
            
            if (request && request.status !== 'pending') {
                requestRef.off();
                this.hideWaitingDialog();
                
                if (request.status === 'deny') {
                    alert('Your join request was denied by the session owner.');
                    requestRef.remove();
                    window.location.href = window.location.origin + window.location.pathname;
                } else {
                    this.userPermissions[this.currentUser.id] = request.status;
                    requestRef.remove();
                    this.joinExistingSession(sessionId);
                    
                    if (request.status === 'readonly') {
                        this.setEditorReadOnly(true);
                    }
                }
            }
        });
    }

    cleanupFirebaseConnections() {
        if (!this.db) return;
        
        try {
            if (this.sessionId) {
                const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
                sessionRef.off();
                
                if (this.firebaseConnected && !this.removedFromSession) {
                    sessionRef.child(`users/${this.currentUser.id}/active`).set(false);
                }
            }
            
            this.db.ref(".info/connected").off();
            
            if (this.db.goOffline) {
                this.db.goOffline();
            }
            
            if (this.heartbeatInterval) {
                clearInterval(this.heartbeatInterval);
            }
            
            this.firebaseConnected = false;
        } catch (error) {
            console.error("Error during Firebase cleanup:", error);
        }
    }
    
    generateSessionId() {
        return Math.random().toString(36).substring(2, 8);
    }
    
    getSessionIdFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('session');
    }
    
    async shareSession() {
        if (!this.firebaseConnected) {
            alert('Collaboration is not available. Please check your internet connection and try again.');
            return;
        }

        if (!this.currentUser.name) {
            try {
                const userName = await this.showNameDialog();
                this.currentUser.name = userName;
            } catch (error) {
                if (error === 'cancelled') return;
            }
        }
        
        this.currentUser.isOwner = true;
        
        const url = new URL(window.location.href);
        url.searchParams.set('session', this.sessionId);
        window.history.pushState({}, '', url);
        
        this.createNewSession();
        
        this.displaySessionInfo();
        
        navigator.clipboard.writeText(window.location.href)
            .then(() => {
                alert('Collaboration link copied to clipboard! Share it with others to collaborate on this HTML page.');
            })
            .catch(err => {
                console.error('Failed to copy link:', err);
                alert('Collaboration link: ' + window.location.href);
            });
    }
    
    createNewSession() {
        if (!this.firebaseConnected || !this.db) {
            this.showConnectionStatus("Cannot create session: not connected.", "error");
            return;
        }
        
        const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
        
        sessionRef.set({
            code: this.editor.getValue(),
            createdAt: firebase.database.ServerValue.TIMESTAMP,
            lastActivity: firebase.database.ServerValue.TIMESTAMP,
            owner: this.currentUser.id,
            users: {
                [this.currentUser.id]: {
                    name: this.currentUser.name,
                    color: this.currentUser.color,
                    active: true,
                    isOwner: true,
                    lastActive: firebase.database.ServerValue.TIMESTAMP
                }
            },
            permissions: {
                [this.currentUser.id]: 'write'
            }
        }).then(() => {
            console.log("Session created successfully:", this.sessionId);
            this.setupSessionListeners();
            this.setupJoinRequestListener();
        }).catch(error => {
            console.error("Error creating session:", error);
            this.showConnectionStatus("Error creating session. Please try again.", "error");
        });
    }

    setupJoinRequestListener() {
        if (!this.firebaseConnected || !this.db || !this.currentUser.isOwner) return;

        const requestsRef = this.db.ref(`htmlSessions/${this.sessionId}/joinRequests`);
        
        requestsRef.on('child_added', (snapshot) => {
            const request = snapshot.val();
            
            if (request.status === 'pending') {
                this.showJoinRequestDialog(request.userId, request.userName);
            }
        });
    }
    
    joinExistingSession(sessionId) {
        if (!this.firebaseConnected || !this.db) {
            this.showConnectionStatus("Cannot join session: not connected.", "error");
            return;
        }
        
        const sessionRef = this.db.ref(`htmlSessions/${sessionId}`);
        
        sessionRef.once('value')
            .then(snapshot => {
                if (snapshot.exists()) {
                    const sessionData = snapshot.val();
                    
                    this.disableSync = true;
                    
                    this.editor.setValue(sessionData.code || '');
                    
                    const userRef = sessionRef.child(`users/${this.currentUser.id}`);
                    return userRef.set({
                        name: this.currentUser.name,
                        color: this.currentUser.color,
                        active: true,
                        isOwner: this.currentUser.isOwner,
                        lastActive: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        if (sessionData.permissions && sessionData.permissions[this.currentUser.id]) {
                            this.userPermissions[this.currentUser.id] = sessionData.permissions[this.currentUser.id];
                            
                            if (sessionData.permissions[this.currentUser.id] === 'readonly') {
                                this.setEditorReadOnly(true);
                            }
                        }
                        
                        setTimeout(() => {
                            this.disableSync = false;
                        }, 1000);
                        
                        this.displaySessionInfo();
                        this.setupSessionListeners();
                        this.showConnectionStatus("Joined collaborative session successfully!", "success");
                        
                        if (this.currentUser.isOwner) {
                            this.setupJoinRequestListener();
                        }
                    });
                } else {
                    this.showConnectionStatus("Session not found, creating new session.", "info");
                    return this.createNewSession();
                }
            })
            .catch(error => {
                console.error("Error joining session:", error);
                this.showConnectionStatus("Error joining session. Please try again.", "error");
            });
    }
    
    setupSessionListeners() {
        if (!this.firebaseConnected || !this.db) {
            return;
        }
        
        const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
        
        sessionRef.child('code').on('value', snapshot => {
            const newCode = snapshot.val();
            
            if (newCode && newCode !== this.editor.getValue() && !this.isLocalUpdate) {
                this.disableSync = true;
                
                const cursor = this.editor.getCursor();
                const scrollInfo = this.editor.getScrollInfo();
                
                this.editor.setValue(newCode);
                
                try {
                    this.editor.setCursor(cursor);
                    this.editor.scrollTo(scrollInfo.left, scrollInfo.top);
                } catch (e) {
                    console.error("Error restoring cursor position:", e);
                }
                
                setTimeout(() => {
                    this.disableSync = false;
                }, 300);
            }
        }, error => {
            console.error("Error in code change listener:", error);
        });
        
        sessionRef.child('users').on('value', snapshot => {
            const users = snapshot.val();
            this.collaborators = users || {};
            this.updateCollaboratorsList();
        }, error => {
            console.error("Error in users change listener:", error);
        });

        sessionRef.child('permissions').on('value', snapshot => {
            const permissions = snapshot.val();
            if (permissions) {
                const myPermission = permissions[this.currentUser.id];
                if (myPermission && myPermission !== this.userPermissions[this.currentUser.id]) {
                    this.userPermissions[this.currentUser.id] = myPermission;
                    
                    if (myPermission === 'readonly') {
                        this.setEditorReadOnly(true);
                    } else if (myPermission === 'write') {
                        this.setEditorReadOnly(false);
                        this.showConnectionStatus("You now have edit access!", "success");
                    }
                }
            }
        }, error => {
            console.error("Error in permissions change listener:", error);
        });

        sessionRef.child(`removedUsers/${this.currentUser.id}`).on('value', snapshot => {
            if (snapshot.exists() && !this.currentUser.isOwner) {
                this.removedFromSession = true;
                this.setEditorReadOnly(true);
                this.showConnectionStatus("You have been removed from this session by the owner.", "error");
                
                this.cleanupFirebaseConnections();
                
                setTimeout(() => {
                    alert('You have been removed from this session.');
                    window.location.href = window.location.origin + window.location.pathname;
                }, 2000);
            }
        }, error => {
            console.error("Error in removedUsers listener:", error);
        });
        
        this.heartbeatInterval = setInterval(() => {
            if (this.firebaseConnected && !this.removedFromSession) {
                sessionRef.child(`users/${this.currentUser.id}/lastActive`).set(firebase.database.ServerValue.TIMESTAMP);
            }
        }, 30000);
    }

    syncCodeToFirebase() {
        if (!this.firebaseConnected || this.isLocalUpdate || this.disableSync || this.removedFromSession) return;
        
        this.isLocalUpdate = true;
        
        const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
        sessionRef.child('code').set(this.editor.getValue())
            .then(() => {
                sessionRef.child('lastActivity').set(firebase.database.ServerValue.TIMESTAMP);
                setTimeout(() => {
                    this.isLocalUpdate = false;
                }, 300);
            })
            .catch(error => {
                console.error("Error syncing code:", error);
                this.isLocalUpdate = false;
            });
    }
    
    updateCollaboratorsList() {
        const activeUsers = Object.entries(this.collaborators)
            .filter(([id, user]) => user.active)
            .map(([id, user]) => ({ ...user, id }));
        
        if (activeUsers.length <= 1) {
            this.elements.sessionInfoDisplay.classList.add('hidden');
            return;
        }
        
        this.elements.sessionInfoDisplay.classList.remove('hidden');
        
        const ownerControls = this.currentUser.isOwner ? activeUsers
            .filter(user => !user.isOwner)
            .map(user => {
                const permission = this.userPermissions[user.id] || 'readonly';
                return `
                    <div class="flex items-center gap-2 px-3 py-1 bg-white rounded-full border-2 border-amber-200 cursor-pointer hover:border-amber-400 transition" onclick="compiler.showUserManageDialog('${user.id}', '${user.name}', '${permission}')">
                        <span class="w-3 h-3 rounded-full" style="background-color: ${user.color}"></span>
                        <span class="text-sm font-medium text-gray-700">${user.name}</span>
                        <span class="text-xs px-2 py-0.5 rounded ${permission === 'write' ? 'bg-green-500 text-white' : 'bg-yellow-500 text-white'}">
                            ${permission === 'write' ? '✓ Write' : '👁 Read'}
                        </span>
                    </div>
                `;
            }).join('') : '';
        
        this.elements.sessionInfoDisplay.innerHTML = `
            <div class="flex items-center gap-3 flex-wrap">
                <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <span class="font-semibold text-gray-700">Active Collaborators (${activeUsers.length}):</span>
                <div class="flex gap-2 flex-wrap">
                    ${activeUsers.filter(user => user.isOwner).map(user => `
                        <div class="flex items-center gap-2 px-3 py-1 bg-white rounded-full border-2 border-amber-400">
                            <span class="w-3 h-3 rounded-full" style="background-color: ${user.color}"></span>
                            <span class="text-sm font-medium text-gray-700">${user.name}</span>
                            <span class="text-xs bg-amber-500 text-white px-2 py-0.5 rounded">Owner</span>
                        </div>
                    `).join('')}
                    ${ownerControls}
                    ${!this.currentUser.isOwner ? activeUsers.filter(user => !user.isOwner).map(user => `
                        <div class="flex items-center gap-2 px-3 py-1 bg-white rounded-full border-2 border-amber-200">
                            <span class="w-3 h-3 rounded-full" style="background-color: ${user.color}"></span>
                            <span class="text-sm font-medium text-gray-700">${user.name}</span>
                        </div>
                    `).join('') : ''}
                </div>
            </div>
        `;
    }

    toggleUserPermission(userId, newPermission) {
        if (!this.currentUser.isOwner || !this.firebaseConnected) return;

        if (!newPermission) {
            const currentPermission = this.userPermissions[userId] || 'readonly';
            newPermission = currentPermission === 'write' ? 'readonly' : 'write';
        }

        this.userPermissions[userId] = newPermission;

        const sessionRef = this.db.ref(`htmlSessions/${this.sessionId}`);
        sessionRef.child(`permissions/${userId}`).set(newPermission).then(() => {
            this.updateCollaboratorsList();
            this.showConnectionStatus(`Updated permission to ${newPermission}`, "success");
        }).catch(error => {
            console.error('Error updating permission:', error);
        });
    }
    
    displaySessionInfo() {
        this.elements.collaborateButton.innerHTML = `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            Copy Link
        `;
    }

    getRandomColor() {
        const colors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#FDCA40', 
            '#F86624', '#43BCCD', '#9792E3', '#53DD6C',
            '#FFC857', '#E94F37', '#1F7A8C', '#ADCBE3'
        ];
        return colors[Math.floor(Math.random() * colors.length)];
    }
}

let compiler;
window.addEventListener("load", () => {
    compiler = new HTMLCompiler();
});

    function escapeHtml(text) {

        };

    async function typeCodeIntoEditor(code) {
        const cm = getCodeMirrorInstance();
        if (!cm) {
            setCurrentCode(code);
            return;
        }
        
        cm.setValue('');
        
        const CHARS_PER_BATCH = 5;
        const DELAY_MS = 10;
        
        let currentIndex = 0;
        
        while (currentIndex < code.length) {
            const chunk = code.slice(currentIndex, currentIndex + CHARS_PER_BATCH);
            const currentContent = cm.getValue();
            cm.setValue(currentContent + chunk);
            
            cm.scrollTo(0, cm.getScrollInfo().height);
            
            currentIndex += CHARS_PER_BATCH;
            
            await new Promise(resolve => setTimeout(resolve, DELAY_MS));
        }
    }

    async function callGeminiAPI(prompt) {
        if (CONFIG.GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') {
            throw new Error('Please set your Gemini API key in the CONFIG object.');
        }
        
        const response = await fetch(`${CONFIG.GEMINI_API_URL}?key=${CONFIG.GEMINI_API_KEY}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: prompt
                    }]
                }],
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 8192,
                }
            })
        });
        
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || 'API request failed');
        }
        
        const data = await response.json();
        
        if (!data.candidates || data.candidates.length === 0) {
            throw new Error('No response from AI');
        }
        
        return data.candidates[0].content.parts[0].text;
    }
    
    function extractHTMLCode(response) {
        const htmlBlockRegex = /```html\s*([\s\S]*?)```/i;
        const genericCodeBlockRegex = /```[\w]*\s*([\s\S]*?)```/;
        
        let match = response.match(htmlBlockRegex) || response.match(genericCodeBlockRegex);
        
        if (match && match[1]) {
            return match[1].trim();
        }
        
        return response.trim();
    }
    
})();

    function generateSiteId() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < 6; i++) {

    function getTimeLeft(expiresAt) {
        const now = Date.now();
        const diff = expiresAt - now;

        if (diff <= 0) return 'Expired';

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

        if (hours > 0) {
            return `${hours}h ${minutes}m`;
        } else {
            return `${minutes}m`;
        }
    }

    function formatDate(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins} minutes ago`;
        if (diffHours < 24) return `${diffHours} hours ago`;
        if (diffDays < 7) return `${diffDays} days ago`;

        return date.toLocaleDateString();
    }

            <script>
            (function() {
                'use strict';
            
                if (window.location.pathname === '/view' || window.location.search.includes('site=')) {
                    initViewer();
                }
            
                function initViewer() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const siteId = urlParams.get('site');
            
                    if (!siteId) {
                        document.body.innerHTML = `
                            <div class="flex items-center justify-center min-h-screen bg-gray-100">
                                <div class="text-center">
                                    <h1 class="text-4xl font-bold text-gray-800 mb-4">Invalid Site URL</h1>
                                    <p class="text-gray-600">Please check the URL and try again.</p>
                                </div>
                            </div>
                        `;
                        return;
                    }
            
                    const [userId, siteKey] = siteId.split('_');
            
                    if (!userId || !siteKey) {
                        document.body.innerHTML = `
                            <div class="flex items-center justify-center min-h-screen bg-gray-100">
                                <div class="text-center">
                                    <h1 class="text-4xl font-bold text-gray-800 mb-4">Invalid Site ID</h1>
                                    <p class="text-gray-600">The site URL is malformed.</p>
                                </div>
                            </div>
                        `;
                        return;
                    }
            
                    document.body.innerHTML = `
                        <div class="flex items-center justify-center min-h-screen bg-gray-100">
                            <div class="text-center">
                                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-green-500 mx-auto mb-4"></div>
                                <p class="text-gray-700 font-medium">Loading site...</p>
                            </div>
                        </div>
                    `;
            
                    loadFirebaseForViewer().then(() => {
                        loadAndRenderSite(userId, siteKey);
                    });
                }
            
                function loadFirebaseForViewer() {
                    return new Promise((resolve) => {
                        if (window.firebase && window.firebase.database) {
                            resolve();
                            return;
                        }
            
                        const appScript = document.createElement('script');
                        appScript.src = 'https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js';
                        appScript.onload = () => {
                            const dbScript = document.createElement('script');
                            dbScript.src = 'https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js';
                            dbScript.onload = () => {
                                if (!firebase.apps.length) {
                                    firebase.initializeApp({
                                        apiKey: "AIzaSyA8uC71uUIxCrmI5Rfm3WIe08uknDGk2xM",
                                        authDomain: "code-compiler-1.firebaseapp.com",
                                        databaseURL: "https://code-compiler-1-default-rtdb.firebaseio.com",
                                        projectId: "code-compiler-1",
                                        storageBucket: "code-compiler-1.firebasestorage.app",
                                        messagingSenderId: "779001738729",
                                        appId: "1:779001738729:web:0b1bdd8960439b2ad50778"
                                    });
                                }
                                resolve();
                            };
                            document.head.appendChild(dbScript);
                        };
                        document.head.appendChild(appScript);
                    });
                }
            
                async function loadAndRenderSite(userId, siteKey) {
                    try {
                        const db = firebase.database();
                        const siteRef = db.ref(`deployedSites/${userId}/${siteKey}`);
                        const snapshot = await siteRef.once('value');
            
                        if (!snapshot.exists()) {
                            document.body.innerHTML = `
                                <div class="flex items-center justify-center min-h-screen bg-gray-100">
                                    <div class="text-center">
                                        <h1 class="text-4xl font-bold text-gray-800 mb-4">Site Not Found</h1>
                                        <p class="text-gray-600 mb-2">This site may have been deleted or expired.</p>
                                        <p class="text-sm text-gray-500">Sites are automatically deleted after 24 hours.</p>
                                    </div>
                                </div>
                            `;
                            return;
                        }
            
                        const siteData = snapshot.val();
                        const expiresAt = siteData.deployedAt + (24 * 60 * 60 * 1000);//time
                        const now = Date.now();
            
                        if (now > expiresAt) {
                            await siteRef.remove();
                            document.body.innerHTML = `
                                <div class="flex items-center justify-center min-h-screen bg-gray-100">
                                    <div class="text-center">
                                        <h1 class="text-4xl font-bold text-gray-800 mb-4">Site Expired</h1>
                                        <p class="text-gray-600">This site has been automatically deleted after 24 hours.</p>
                                    </div>
                                </div>
                            `;
                            return;
                        }
            
                        document.open();
                        document.write(siteData.code);
                        document.close();
            
                    } catch (error) {
                        console.error('Error loading site:', error);
                        document.body.innerHTML = `
                            <div class="flex items-center justify-center min-h-screen bg-gray-100">
                                <div class="text-center">
                                    <h1 class="text-4xl font-bold text-gray-800 mb-4">Error Loading Site</h1>
                                    <p class="text-gray-600">Failed to load the site. Please try again later.</p>
                                </div>
                            </div>
                        `;
                    }
                }
            
            })();
            </script>
